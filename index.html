<!DOCTYPE html><html><head><title>racing-game-2709</title><style>
body{background:#1a1a2e;color:white;font-family:Arial;text-align:center}
canvas{background:#16213e;display:block;margin:20px auto}
</style></head><body>
<h1>Racing</h1>
<canvas id="c" width="800" height="400"></canvas>
<p>Hold SPACE to accelerate, release to brake</p>
<div id="lap">Lap: 0</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const ws=new WebSocket(`ws://${location.host}/ws`);
let playerId=null,players={},accelerating=false;

ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='init')playerId=d.player_id;
    else if(d.type==='state')d.players.forEach(p=>players[p.id]=p);
};

document.onkeydown=e=>{if(e.code==='Space'){e.preventDefault();accelerating=true;ws.send(JSON.stringify({accelerate:true}))}};
document.onkeyup=e=>{if(e.code==='Space'){accelerating=false;ws.send(JSON.stringify({brake:true}))}};

setInterval(()=>{if(accelerating)ws.send(JSON.stringify({accelerate:true}))},50);

function draw(){
    ctx.fillStyle='#16213e';ctx.fillRect(0,0,800,400);
    ctx.strokeStyle='white';ctx.beginPath();ctx.moveTo(0,320);ctx.lineTo(800,320);ctx.stroke();
    for(let id in players){
        const p=players[id];
        ctx.fillStyle=p.color;
        ctx.fillRect(p.x,300,30,20);
        if(p.id===playerId)document.getElementById('lap').textContent='Lap: '+p.lap;
    }
    requestAnimationFrame(draw);
}
draw();
</script></body></html>
